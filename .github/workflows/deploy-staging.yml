name: Deploy staging to GitHub Pages

# Staging previewer for a STATIC site. Publishes the `staging` branch to GitHub
# Pages and injects no-index protection at BUILD TIME so the noindex tag is never
# committed to any file. This means merging staging -> main can never leak the tag
# onto the live production site (Model B — pipeline decides, not the branch/file).

on:
  push:
    branches: [staging]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one staging deploy at a time; newer pushes cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (mounted under the Pages subpath)
        run: npm run build
        env:
          # GitHub Pages serves this project site at /<repo>/. The base path
          # makes every BASE_URL-derived link/asset resolve correctly there.
          # Production (Cloudflare, root domain) builds without this var.
          PAGES_BASE: /paternal-guardians/

      - name: Inject noindex meta tag into all built HTML files
        run: |
          # Insert a robots noindex meta immediately after each <head> tag.
          # Done at build time only — never committed to the repo.
          find ./dist -name '*.html' -print0 \
            | xargs -0 -I{} sed -i \
              's#<head>#<head>\n<meta name="robots" content="noindex, nofollow">#I' {}
          echo "Injected noindex into:"
          grep -rl 'noindex' --include='*.html' ./dist || true

      - name: Write blocking robots.txt
        run: |
          printf 'User-agent: *\nDisallow: /\n' > ./dist/robots.txt
          echo "robots.txt now:"
          cat ./dist/robots.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
